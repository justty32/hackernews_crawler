paths:
  raw_dir: "data/raw"
  summary_dir: "data/summary"
  archive_dir: "data/archive"
  notification_dir: "data/notifications"

llm_providers:
  google:
    model: "gemini/gemini-2.5-flash"
  openai:
    model: "gpt-3.5-turbo"
  ollama:
    model: "ollama/qwen3:32b"
    api_base: "http://192.168.1.146:11434"
  lm_studio:
    model: "openai/local-model"
    api_base: "http://localhost:1234/v1"

crawler:
  top_limit: 10
  comment_threshold: 10
  keywords: []

summarizer:
  provider: "google"
  max_tokens: 16284
  temperature: 0.3
  dynamic_prompts:
    "AI": "請特別關注 AI 與 LLM 相關的技術突破與應用場景。"
    "Rust": "請特別關注 Rust 語言的效能優化與安全性討論。"

monitoring:
  enabled: true
  delay: 1
  provider: "ollama"
  rules:
    title_keywords: ["AI", "Rust"]
    summary_keywords: []
    comment_keywords: []
    min_comments: 10
    expert_check_prompt: "檢查是否有專業人士的實作經驗分享。"
  category_prompts:
    "AI": "請特別檢查文中是否提到實際的測試數據或模型限制。"
  channels:
    email:
      enabled: false
      recipient: "user@example.com"
      subject_prefix: "[HN Match] "
    file:
      enabled: true
      output_dir: "data/notifications"

organizer:
  raw_retention_days: 30
  summary_retention_days: 90
  categories:
    "AI": ["AI", "LLM", "Machine Learning"]
    "Software": ["Rust", "Python", "Go", "C++"]
    "Security": ["Security", "Hacking", "CVE"]
